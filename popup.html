<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Спросить у Алисы</title>
  <style>
    /* ═══════════════════════════════════════
       Custom Properties
       ═══════════════════════════════════════ */
    :root {
      --color-bg: #ffffff;
      --color-text: #1a1a1a;
      --color-text-secondary: #888888;
      --color-text-muted: #aaaaaa;
      --color-border: #e5e5e5;
      --color-border-light: #f0f0f0;
      --color-border-focus: #fc0;
      --color-accent: #fc0;
      --color-accent-hover: #f0b800;
      --color-accent-light: #fff8e0;
      --color-error-bg: #fff0f0;
      --color-error-text: #d32f2f;
      --color-input-bg: #f8f8f8;
      --color-success-bg: #f0fff4;
      --color-history-hover: #fafafa;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 6px;
      --transition: 0.2s ease;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #1e1e1e;
        --color-text: #e8e8e8;
        --color-text-secondary: #999999;
        --color-text-muted: #666666;
        --color-border: #333333;
        --color-border-light: #2a2a2a;
        --color-accent-light: #332c00;
        --color-error-bg: #3d1f1f;
        --color-error-text: #ff6b6b;
        --color-input-bg: #2a2a2a;
        --color-success-bg: #1a3d1a;
        --color-history-hover: #252525;
      }
    }

    /* ═══════════════════════════════════════
       Reset & Base
       ═══════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      min-height: 180px;
      max-height: 520px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI',
                   'Helvetica Neue', Roboto, Arial, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* ═══════════════════════════════════════
       Header
       ═══════════════════════════════════════ */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px 0;
      user-select: none;
    }

    .header__icon {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--color-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header__icon svg { width: 14px; height: 14px; fill: #333; }
    .header__title { font-size: 14px; font-weight: 600; }
    .header__badge {
      margin-left: auto;
      font-size: 10px;
      color: var(--color-text-muted);
      padding: 1px 5px;
      border-radius: 4px;
      border: 1px solid var(--color-border);
    }

    /* ═══════════════════════════════════════
       States
       ═══════════════════════════════════════ */
    .state { display: none; }

    .state.active {
      display: flex;
      flex-direction: column;
    }

    /* ── State: Input ── */
    #state-input.active {
      padding: 10px 16px 8px;
      gap: 8px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .input-wrapper { flex: 1; position: relative; }

    textarea#queryInput {
      width: 100%;
      padding: 9px 12px;
      border: 2px solid var(--color-border);
      border-radius: var(--radius);
      background: var(--color-input-bg);
      color: var(--color-text);
      font-size: 13px;
      font-family: inherit;
      line-height: 1.5;
      resize: none;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      min-height: 38px;
      max-height: 100px;
    }
    textarea#queryInput::placeholder { color: var(--color-text-muted); }
    textarea#queryInput:focus {
      border-color: var(--color-border-focus);
      box-shadow: 0 0 0 3px rgba(255, 204, 0, 0.15);
    }

    .send-btn {
      width: 38px; height: 38px;
      border: none;
      border-radius: 50%;
      background: var(--color-accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition), background var(--transition), opacity var(--transition);
      flex-shrink: 0;
      opacity: 0.6;
    }
    .send-btn.active { opacity: 1; }
    .send-btn:hover { background: var(--color-accent-hover); transform: scale(1.05); }
    .send-btn:active { transform: scale(0.92); }
    .send-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 16px; height: 16px; fill: #333; }

    /* ── History ── */
    .history-section { margin-top: 2px; }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
      cursor: pointer;
      user-select: none;
      font-size: 11px;
      color: var(--color-text-muted);
      border-bottom: 1px solid var(--color-border-light);
    }
    .history-header:hover { color: var(--color-text-secondary); }
    .history-header .arrow {
      font-size: 9px;
      transition: transform var(--transition);
    }
    .history-header .arrow.open { transform: rotate(90deg); }

    .history-list {
      max-height: 140px;
      overflow-y: auto;
      scrollbar-width: thin;
    }
    .history-list.collapsed { display: none; }

    .history-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      font-size: 12px;
      cursor: pointer;
      border-radius: var(--radius-xs);
      transition: background var(--transition);
      color: var(--color-text-secondary);
      word-break: break-word;
    }
    .history-item:hover { background: var(--color-history-hover); color: var(--color-text); }
    .history-item .icon { font-size: 10px; flex-shrink: 0; opacity: 0.5; }
    .history-item .text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-item .del {
      font-size: 14px; opacity: 0; flex-shrink: 0;
      background: none; border: none; cursor: pointer; color: var(--color-text-muted);
      padding: 0 2px; line-height: 1;
    }
    .history-item:hover .del { opacity: 0.5; }
    .history-item .del:hover { opacity: 1; color: var(--color-error-text); }

    .history-empty {
      font-size: 11px;
      color: var(--color-text-muted);
      text-align: center;
      padding: 12px 0;
    }

    /* ── State: Loading ── */
    #state-loading.active {
      padding: 28px 16px;
      align-items: center;
      gap: 14px;
      text-align: center;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--color-border);
      border-top-color: var(--color-accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 13px;
      color: var(--color-text-secondary);
    }

    .loading-query {
      font-size: 12px;
      color: var(--color-text-muted);
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cancel-btn {
      margin-top: 4px;
      background: none;
      border: 1px solid var(--color-border);
      padding: 5px 16px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      color: var(--color-text-secondary);
      transition: all var(--transition);
    }
    .cancel-btn:hover {
      background: var(--color-input-bg);
      color: var(--color-text);
    }

    /* ── State: Result ── */
    #state-result.active {
      padding: 8px 16px 10px;
      gap: 6px;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--color-text-muted);
      padding-bottom: 4px;
      border-bottom: 1px solid var(--color-border-light);
    }
    .result-header .label { font-weight: 500; }

    .result-actions {
      display: flex;
      gap: 4px;
    }
    .result-actions button {
      background: none;
      border: none;
      font-size: 11px;
      color: var(--color-text-muted);
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all var(--transition);
    }
    .result-actions button:hover {
      background: var(--color-input-bg);
      color: var(--color-text);
    }
    .result-actions button.copied { color: #4caf50; }

    .result-content {
      font-size: 13px;
      line-height: 1.6;
      max-height: 240px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      padding: 6px 0;
      scrollbar-width: thin;
    }

    .result-footer {
      display: flex;
      gap: 6px;
      padding-top: 6px;
    }
    .result-footer button {
      flex: 1;
      background: var(--color-input-bg);
      border: 1px solid var(--color-border);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      cursor: pointer;
      color: var(--color-text);
      transition: all var(--transition);
    }
    .result-footer button:hover {
      background: var(--color-accent-light);
      border-color: var(--color-accent);
    }

    /* ── State: Error ── */
    #state-error.active {
      padding: 20px 16px;
      align-items: center;
      gap: 10px;
      text-align: center;
    }
    .error-icon { font-size: 28px; }
    .error-text { font-size: 13px; color: var(--color-error-text); line-height: 1.5; }
    .error-sub {
      font-size: 11px;
      color: var(--color-text-muted);
    }
    .error-btn {
      margin-top: 4px;
      background: var(--color-accent);
      border: none;
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition);
    }
    .error-btn:hover { background: var(--color-accent-hover); }

    /* ── Footer ── */
    .footer {
      padding: 5px 16px 8px;
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--color-text-muted);
      border-top: 1px solid var(--color-border-light);
      margin-top: auto;
    }
    .footer kbd {
      display: inline-block;
      padding: 0 4px;
      font-size: 9px;
      font-family: inherit;
      background: var(--color-input-bg);
      border: 1px solid var(--color-border);
      border-radius: 3px;
    }
  </style>
</head>
<body>

  <!-- ════════════ Header ════════════ -->
  <div class="header">
    <div class="header__icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    </div>
    <span class="header__title">Спросить у Алисы</span>
    <span class="header__badge">Ctrl+Shift+A</span>
  </div>

  <!-- ════════════ State: Input ════════════ -->
  <div id="state-input" class="state active">
    <div class="input-row">
      <div class="input-wrapper">
        <textarea id="queryInput" rows="1" placeholder="Введите запрос..." maxlength="1000"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" disabled>
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>

    <div class="history-section">
      <div class="history-header" id="historyToggle">
        <span>📜 История запросов</span>
        <span class="arrow open">▶</span>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <!-- ════════════ State: Loading ════════════ -->
  <div id="state-loading" class="state">
    <div class="spinner"></div>
    <div class="loading-text">Алиса думает...</div>
    <div class="loading-query" id="loadingQuery"></div>
    <button class="cancel-btn" id="cancelBtn">Отменить</button>
  </div>

  <!-- ════════════ State: Result ════════════ -->
  <div id="state-result" class="state">
    <div class="result-header">
      <span class="label">🤖 Ответ Алисы</span>
      <div class="result-actions">
        <button id="copyBtn" title="Копировать">📋 Копировать</button>
      </div>
    </div>
    <div class="result-content" id="resultContent"></div>
    <div class="result-footer">
      <button id="newQueryBtn">✏️ Новый запрос</button>
      <button id="openInTabBtn">↗ Перейти к Алисе</button>
    </div>
  </div>

  <!-- ════════════ State: Error ════════════ -->
  <div id="state-error" class="state">
    <div class="error-icon">😕</div>
    <div class="error-text" id="errorText">Что-то пошло не так</div>
    <div class="error-sub" id="errorSubtext"></div>
    <button class="error-btn" id="retryBtn">Попробовать снова</button>
  </div>

  <!-- ════════════ Footer ════════════ -->
  <div class="footer">
    <span><kbd>↵</kbd> отправить · <kbd>Esc</kbd> закрыть</span>
    <span id="footerHistoryCount"></span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
